<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phase 3 — SHG Solver Verification</title>
<style>
  body  { background:#0d1117; color:#c0d0e0; font-family:monospace; padding:1.5rem; }
  h1   { color:#7ec8e3; font-size:1.1rem; margin-bottom:0.4rem; }
  h2   { color:#4a9a7a; font-size:0.85rem; margin:1.4rem 0 0.4rem; border-bottom:1px solid #1a3a2a; padding-bottom:3px; }
  table { border-collapse:collapse; width:100%; margin-bottom:0.6rem; font-size:0.78rem; }
  th   { color:#4a7a9a; text-align:left; padding:3px 12px 3px 0; border-bottom:1px solid #1a2a3a; }
  td   { padding:2px 12px 2px 0; }
  .pass { color:#40cc70; } .fail { color:#e05050; }
  .val  { color:#b0d0e8; } .note { color:#3a6050; font-size:0.7rem; }
  .dim  { color:#4a6050; }
  #summary { margin-top:1rem; font-size:0.82rem; }
</style>
</head>
<body>
<h1>Phase 3 — SHG Solver Verification</h1>
<p class="note">solveSHG(crystal, pump) → Type-I/II angles, walk-off, field indices</p>

<script src="../01-crystals/bbo.js"></script>
<script src="../01-crystals/ktp.js"></script>
<script src="../01-crystals/lbo.js"></script>
<script src="../01-crystals/kdp.js"></script>
<script src="../01-crystals/ppln.js"></script>
<script src="../01-crystals/index.js"></script>
<script src="sellmeier.js"></script>
<script src="phase-match.js"></script>

<script>
const DEG = Math.PI / 180;
let pass = 0, fail = 0;

function check(label, computed, expected, tol, unit='') {
  const delta = Math.abs(computed - expected);
  const ok = isFinite(computed) && delta <= tol;
  ok ? pass++ : fail++;
  return `<tr>
    <td class="val">${label}</td>
    <td class="val">${isFinite(computed) ? computed.toFixed(3) : 'null'} ${unit}</td>
    <td class="val">${expected.toFixed(3)} ${unit}</td>
    <td class="${ok?'pass':'fail'}">${isFinite(computed)?delta.toFixed(3):'—'}</td>
    <td class="${ok?'pass':'fail'}">${ok?'✓':'✗'}</td>
  </tr>`;
}
function hdr() {
  return '<tr><th>Check</th><th>Computed</th><th>Expected</th><th>Δ</th><th>OK</th></tr>';
}

// ── 1. solveSHG() API output format ─────────────────────────────────────────
const h1 = document.createElement('h2');
h1.textContent = 'solveSHG() — BBO 1064nm';
document.body.appendChild(h1);

const bbo_1064 = solveSHG(BBO, 1064e-9);
const bbo_typeI  = bbo_1064.find(r => r.type === 'Type-I');
const bbo_typeII = bbo_1064.find(r => r.type === 'Type-II');

const t1 = document.createElement('table');
t1.innerHTML = hdr();

// Type-I angle (well-known: 22.8°)
t1.innerHTML += check('BBO Type-I θ_pm',
  bbo_typeI?.theta_deg ?? NaN, 22.8, 0.3, '°');

// Type-I walk-off at SH (BBO well known ~3.2° at 532nm)
t1.innerHTML += check('BBO Type-I ρ (walk-off at 532nm)',
  bbo_typeI?.rho_deg ?? NaN, 3.2, 0.5, '°');

// Type-II angle — BBO literature: ~32.2° for 1064nm (Dmitriev 1997)
t1.innerHTML += check('BBO Type-II θ_pm',
  bbo_typeII?.theta_deg ?? NaN, 32.2, 1.0, '°');

// Type-II walk-off at SH
t1.innerHTML += check('BBO Type-II ρ (walk-off at 532nm) > 0',
  bbo_typeII?.rho_deg ?? NaN, 2.0, 2.5, '°');  // just verify it's positive and ~2°

// PM condition check: for Type-I, ne_sh should equal no_fund
t1.innerHTML += check('BBO Type-I: ne_sh ≈ no_fund (PM condition)',
  bbo_typeI?.ne_sh ?? NaN, bbo_typeI?.no_fund ?? NaN, 1e-4);

document.body.appendChild(t1);

// ── 2. solveSHG() — BBO 800nm ───────────────────────────────────────────────
const h2el = document.createElement('h2');
h2el.textContent = 'solveSHG() — BBO 800nm';
document.body.appendChild(h2el);

const bbo_800 = solveSHG(BBO, 800e-9);
const b800_I  = bbo_800.find(r => r.type === 'Type-I');
const b800_II = bbo_800.find(r => r.type === 'Type-II');

const t2 = document.createElement('table');
t2.innerHTML = hdr();
t2.innerHTML += check('BBO Type-I  θ_pm @ 800nm', b800_I?.theta_deg  ?? NaN, 29.2, 0.5, '°');
t2.innerHTML += check('BBO Type-I  ρ    @ 800nm', b800_I?.rho_deg   ?? NaN, 4.0, 1.5, '°');
t2.innerHTML += check('BBO Type-II θ_pm @ 800nm', b800_II?.theta_deg ?? NaN, 42.0, 1.5, '°');
document.body.appendChild(t2);

// ── 3. solveSHG() — KDP 1064nm ──────────────────────────────────────────────
const h3el = document.createElement('h2');
h3el.textContent = 'solveSHG() — KDP 1064nm  (Nikogosyan 2005)';
document.body.appendChild(h3el);

const kdp_1064 = solveSHG(KDP, 1064e-9);
const k_typeI  = kdp_1064.find(r => r.type === 'Type-I');
const k_typeII = kdp_1064.find(r => r.type === 'Type-II');

const t3 = document.createElement('table');
t3.innerHTML = hdr();
t3.innerHTML += check('KDP Type-I  θ_pm  [hist. 41°, Nikogosyan: ~30°]',
  k_typeI?.theta_deg  ?? NaN, 30.3, 1.0, '°');
t3.innerHTML += check('KDP Type-I  ρ (walk-off at 532nm)',
  k_typeI?.rho_deg   ?? NaN, 1.2, 1.0, '°');
if (k_typeII) {
  t3.innerHTML += check('KDP Type-II θ_pm', k_typeII.theta_deg, 44.8, 2.0, '°');
} else {
  t3.innerHTML += `<tr><td class="dim" colspan="5">KDP Type-II: no phase-matching found in [0°,90°]</td></tr>`;
}
document.body.appendChild(t3);

// ── 4. Walk-off formula sanity ───────────────────────────────────────────────
const h4el = document.createElement('h2');
h4el.textContent = 'Walk-off Sanity Checks';
document.body.appendChild(h4el);

const t4 = document.createElement('table');
t4.innerHTML = hdr();

// At θ=0°: no walk-off (propagating along optical axis)
t4.innerHTML += check('BBO walkOff(θ=0°, 532nm) = 0°',
  walkOffAngle(0, 532e-9, BBO) / DEG, 0, 1e-8, '°');

// At θ=90°: no walk-off (propagating perpendicular to optical axis)
t4.innerHTML += check('BBO walkOff(θ=90°, 532nm) = 0°',
  walkOffAngle(90*DEG, 532e-9, BBO) / DEG, 0, 1e-8, '°');

// Maximum walk-off occurs near θ=45° for strongly birefringent crystals
const rho45 = walkOffAngle(45*DEG, 532e-9, BBO) / DEG;
t4.innerHTML += check('BBO walkOff(θ=45°, 532nm) > 0° (negative uniaxial)',
  rho45, rho45, 0, '°');  // just verify positive

document.body.appendChild(t4);

// ── 5. Summary + full result table ───────────────────────────────────────────
const sdiv = document.createElement('div');
sdiv.id = 'summary';
sdiv.innerHTML =
  `<span class="pass">✓ ${pass} passed</span>  ` +
  `<span class="${fail?'fail':'note'}">${fail?'✗ '+fail+' failed':''}</span>`;
document.body.appendChild(sdiv);

// Pretty-print all SHG results
const h5el = document.createElement('h2');
h5el.textContent = 'Full SHG Table — BBO, KDP @ multiple pump wavelengths';
document.body.appendChild(h5el);

const fullTbl = document.createElement('table');
fullTbl.innerHTML = `<tr>
  <th>Crystal</th><th>Pump (nm)</th><th>Type</th><th>Process</th>
  <th>θ_pm (°)</th><th>ρ (°)</th><th>ne_SH</th>
</tr>`;

[[BBO,'BBO'],[KDP,'KDP']].forEach(([c,name]) => {
  [1064,800,532].forEach(pump_nm => {
    const results = solveSHG(c, pump_nm*1e-9);
    if (results.length === 0) {
      fullTbl.innerHTML += `<tr><td class="val">${name}</td><td class="val">${pump_nm}</td>
        <td class="dim" colspan="5">—</td></tr>`;
    }
    results.forEach(r => {
      fullTbl.innerHTML += `<tr>
        <td class="val">${name}</td>
        <td class="val">${pump_nm}</td>
        <td class="val">${r.type}</td>
        <td class="val">${r.process}</td>
        <td class="pass">${r.theta_deg.toFixed(2)}</td>
        <td class="val">${r.rho_deg.toFixed(2)}</td>
        <td class="val">${r.ne_sh.toFixed(4)}</td>
      </tr>`;
    });
  });
});
document.body.appendChild(fullTbl);
</script>
</body>
</html>
