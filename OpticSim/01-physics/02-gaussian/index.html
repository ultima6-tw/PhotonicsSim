<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>02-gaussian test</title>
<style>
  body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; padding: 2rem; }
  h2 { color: #7ec8e3; margin-top: 2rem; }
  .pass { color: #7ed87e; }
  .fail { color: #e37e7e; }
  table { border-collapse: collapse; margin: 0.5rem 0; }
  td, th { padding: 4px 12px; border: 1px solid #444; text-align: right; }
  th { color: #7ec8e3; }
  canvas { display: block; margin: 1rem 0; background: #111; border: 1px solid #444; }
  .label { color: #aaa; font-size: 0.85em; margin-bottom: 0.3rem; }
</style>
</head>
<body>
<h1>02-gaussian — Gaussian Beam Propagation Test</h1>
<div id="output"></div>

<script src="../01-matrices/matrices.js"></script>
<script src="gaussian.js"></script>
<script>
const out = document.getElementById('output');
const results = [];

function assert(label, got, expected, tol = 1e-6) {
  const pass = Math.abs(got - expected) < tol;
  results.push({ label, got, expected, pass });
  return pass;
}
function assertRel(label, got, expected, relTol = 1e-4) {
  const pass = Math.abs(got - expected) / Math.abs(expected) < relTol;
  results.push({ label, got, expected, pass });
  return pass;
}
function section(title) {
  out.innerHTML += `<h2>${title}</h2>`;
}
function render() {
  let html = '<table><tr><th>Test</th><th>Expected</th><th>Got</th><th>Result</th></tr>';
  for (const r of results) {
    const cls = r.pass ? 'pass' : 'fail';
    html += `<tr>
      <td style="text-align:left">${r.label}</td>
      <td>${typeof r.expected === 'number' ? r.expected.toExponential(4) : r.expected}</td>
      <td>${typeof r.got === 'number' ? r.got.toExponential(4) : r.got}</td>
      <td class="${cls}">${r.pass ? '✓' : '✗'}</td>
    </tr>`;
  }
  const total = results.length, passed = results.filter(r => r.pass).length;
  html += `</table><p class="${passed===total?'pass':'fail'}">${passed}/${total} passed</p>`;
  out.innerHTML += html;
  results.length = 0;
}

const LAM = 1064e-9;   // Nd:YAG
const W0  = 1e-3;      // 1 mm waist
const ZR  = rayleighRange(W0, LAM);

// ── 1. Free-space formula check ───────────────────────────────────────────────
section('1. Free Space w(z) = w0 · √(1 + (z/zR)²)');
{
  const system = {
    beam: { lambda: LAM, w0: W0, waistZ: 0 },
    elements: [{ type: 'free', d: 3 * ZR }],
  };
  const { samples } = propagate(system, 300);

  // Check a handful of z values
  for (const zFrac of [0, 0.5, 1, 2, 3]) {
    const z = zFrac * ZR;
    const expected = W0 * Math.sqrt(1 + (z / ZR) ** 2);
    // Find closest sample
    const s = samples.reduce((best, s) => Math.abs(s.z - z) < Math.abs(best.z - z) ? s : best);
    assertRel(`w(${zFrac}·zR)`, s.w, expected, 1e-3);
  }
}
render();

// ── 2. Waist at z=0 detected ─────────────────────────────────────────────────
section('2. Waist Detection');
{
  const system = {
    beam: { lambda: LAM, w0: W0, waistZ: 0 },
    elements: [{ type: 'free', d: 2 * ZR }],
  };
  const { waists, samples } = propagate(system, 200);

  // Waist at waistZ=0 should NOT be detected inside the propagation range
  // (it's at the start boundary, not a sign change)
  assert('no internal waist for simple free propagation', waists.length, 0);

  // Minimum w should be at z=0 (first sample)
  const minW = Math.min(...samples.map(s => s.w));
  assertRel('minimum w = w0', minW, W0, 1e-3);
}
render();

// ── 3. Thin lens re-focuses beam ─────────────────────────────────────────────
section('3. Lens Focusing — waist after lens');
{
  // Collimated beam (far from waist) through lens of focal length f
  // Input: waist at z=-1000*ZR (essentially collimated at z=0)
  // Lens at z=0.5m, then free space
  const f = 0.3;
  const system = {
    beam: { lambda: LAM, w0: W0, waistZ: -1000 * ZR },
    elements: [
      { type: 'free', d: 0.5 },
      { type: 'lens', f },
      { type: 'free', d: 2 * f },
    ],
  };
  const { waists } = propagate(system, 200);

  // Should find one waist after the lens, close to z = 0.5 + f
  assert('one waist found after lens', waists.length, 1);
  if (waists.length >= 1) {
    assertRel('waist near focal point', waists[0].z, 0.5 + f, 0.02);
  }
}
render();

// ── 4. Beam expander magnification ───────────────────────────────────────────
section('4. Beam Expander ×2');
{
  // A 2× beam expander placed at the waist should double the beam size
  // Use a Galilean expander: lens(-f) + free(0) + lens(2f) composed
  // Here we use the beamExpander element with mag=2
  // Input waist at z=0, expander at z=0
  const system = {
    beam: { lambda: LAM, w0: W0, waistZ: 0 },
    elements: [
      { type: 'beamExpander', mag: 2 },
      { type: 'free', d: 3 * ZR },
    ],
  };
  const { samples } = propagate(system, 200);

  // Right after expander (second sample) beam should be ~2×w0
  // (Galilean expander at waist: new waist ~ 2×w0 at same location)
  const wAfter = samples[1].w;
  assertRel('beam ×2 after expander', wAfter, 2 * W0, 0.05);
}
render();

// ── 5. q.i = zR preserved through free space ─────────────────────────────────
section('5. q-parameter integrity');
{
  const system = {
    beam: { lambda: LAM, w0: W0, waistZ: 0 },
    elements: [{ type: 'free', d: 5 * ZR }],
  };
  const { samples } = propagate(system, 500);

  // Im(q) should stay constant = zR throughout free space
  const maxDeviation = Math.max(...samples.map(s => Math.abs(s.qi - ZR)));
  assert('Im(q) = zR constant in free space', maxDeviation < 1e-6 * ZR, true);

  // Re(q) at end should equal totalLength - waistZ = 5*zR
  const last = samples[samples.length - 1];
  assertRel('Re(q) at end = 5·zR', last.qr, 5 * ZR, 1e-4);
}
render();

// ── 6. Round-trip through flat mirror (identity) ──────────────────────────────
section('6. Flat Mirror (identity)');
{
  const system = {
    beam: { lambda: LAM, w0: W0, waistZ: 0 },
    elements: [
      { type: 'free',   d: ZR },
      { type: 'mirror', R: Infinity },
      { type: 'free',   d: ZR },
    ],
  };
  const { samples, optics } = propagate(system, 100);

  // optics list should have one entry (the mirror)
  assert('mirror recorded in optics list', optics.length, 1);
  assert('mirror type', optics[0].type === 'mirror', true);

  // w at end should equal w at 2*zR from waist (mirror adds no power)
  const wEnd = samples[samples.length - 1].w;
  const expected = W0 * Math.sqrt(1 + (2) ** 2);  // z=2*zR
  assertRel('flat mirror: w unchanged vs free', wEnd, expected, 1e-3);
}
render();

// ── 7. Visual preview — w(z) profile ─────────────────────────────────────────
{
  out.innerHTML += `<h2>7. Visual Preview — w(z) profile</h2>`;
  out.innerHTML += `<p class="label">System: free 0.5m → lens f=0.3 → free 0.8m &nbsp;|&nbsp; λ=1064nm, w₀=1mm</p>`;

  const system = {
    beam: { lambda: LAM, w0: W0, waistZ: 0 },
    elements: [
      { type: 'free', d: 0.5 },
      { type: 'lens', f: 0.3 },
      { type: 'free', d: 0.8 },
    ],
  };
  const { samples, optics, waists } = propagate(system, 200);

  // Draw on canvas
  const cw = 700, ch = 220, padX = 50, padY = 30;
  const axisY = ch / 2;   // optical axis at vertical centre
  out.innerHTML += `<canvas id="cv" width="${cw}" height="${ch}"></canvas>`;
  const cv  = document.getElementById('cv');
  const ctx = cv.getContext('2d');

  const zMax = samples[samples.length - 1].z;
  const wMax = Math.max(...samples.map(s => s.w));
  const scale = (axisY - padY) / wMax;   // pixels per metre of beam radius

  function px(z) { return padX + (z / zMax) * (cw - 2 * padX); }
  function pu(w) { return axisY - w * scale; }   // upper boundary
  function pl(w) { return axisY + w * scale; }   // lower boundary

  // Filled beam envelope
  ctx.fillStyle = 'rgba(126,200,227,0.15)';
  ctx.beginPath();
  samples.forEach((s, i) => i === 0 ? ctx.moveTo(px(s.z), pu(s.w)) : ctx.lineTo(px(s.z), pu(s.w)));
  for (let i = samples.length - 1; i >= 0; i--) {
    ctx.lineTo(px(samples[i].z), pl(samples[i].w));
  }
  ctx.closePath(); ctx.fill();

  // Upper envelope
  ctx.strokeStyle = '#7ec8e3'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  samples.forEach((s, i) => i === 0 ? ctx.moveTo(px(s.z), pu(s.w)) : ctx.lineTo(px(s.z), pu(s.w)));
  ctx.stroke();

  // Lower envelope
  ctx.beginPath();
  samples.forEach((s, i) => i === 0 ? ctx.moveTo(px(s.z), pl(s.w)) : ctx.lineTo(px(s.z), pl(s.w)));
  ctx.stroke();

  // Optical axis
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(padX, axisY); ctx.lineTo(cw - padX, axisY); ctx.stroke();
  ctx.setLineDash([]);

  // Optical elements (vertical lines)
  ctx.font = '11px monospace';
  optics.forEach(el => {
    ctx.strokeStyle = '#e3c07e'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(px(el.z), padY); ctx.lineTo(px(el.z), ch - padY); ctx.stroke();
    ctx.fillStyle = '#e3c07e';
    ctx.fillText(el.type, px(el.z) + 4, padY + 10);
  });

  // Waist markers (dot on upper envelope)
  waists.forEach(w => {
    ctx.fillStyle = '#7ed87e';
    ctx.beginPath(); ctx.arc(px(w.z), pu(w.w), 4, 0, 2 * Math.PI); ctx.fill();
    ctx.fillStyle = '#7ed87e';
    ctx.fillText(`${(w.w * 1e6).toFixed(0)}μm`, px(w.z) + 6, pu(w.w) - 4);
  });

  // z-axis labels
  ctx.fillStyle = '#888';
  [0, 0.25, 0.5, 0.75, 1.0].forEach(f => {
    const z = f * zMax;
    ctx.fillText(`${(z * 100).toFixed(0)}cm`, px(z) - 12, ch - 4);
  });

  // w-scale labels
  ctx.fillStyle = '#aaa';
  ctx.fillText(`+${(wMax * 1e3).toFixed(2)}mm`, 2, pu(wMax) + 4);
  ctx.fillText(`−${(wMax * 1e3).toFixed(2)}mm`, 2, pl(wMax) + 4);

  out.insertAdjacentHTML('beforeend', `<p class="label">Waists found: ${waists.map(w=>`z=${(w.z*100).toFixed(1)}cm w=${(w.w*1e6).toFixed(0)}μm`).join(', ') || 'none'}</p>`);
}
</script>
</body>
</html>
