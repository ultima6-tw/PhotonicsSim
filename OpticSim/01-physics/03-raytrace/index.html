<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>03-raytrace test</title>
<style>
  body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; padding: 2rem; }
  h2 { color: #7ec8e3; margin-top: 2rem; }
  .pass { color: #7ed87e; }
  .fail { color: #e37e7e; }
  table { border-collapse: collapse; margin: 0.5rem 0; }
  td, th { padding: 4px 12px; border: 1px solid #444; text-align: right; }
  th { color: #7ec8e3; }
  canvas { display: block; margin: 1rem 0; border: 1px solid #444; }
  .label { color: #aaa; font-size: 0.85em; margin-bottom: 0.3rem; }
</style>
</head>
<body>
<h1>03-raytrace — Geometric Ray Tracing Test</h1>
<div id="out"></div>

<script src="../01-matrices/matrices.js"></script>
<script src="raytrace.js"></script>
<script>
const out = document.getElementById('out');
const results = [];

function assert(label, got, expected, tol = 1e-9) {
  const pass = Math.abs(got - expected) < tol;
  results.push({ label, got, expected, pass });
}
function assertRel(label, got, expected, relTol = 1e-3) {
  const pass = Math.abs(got - expected) / (Math.abs(expected) || 1) < relTol;
  results.push({ label, got, expected, pass });
}
function section(title) { out.innerHTML += `<h2>${title}</h2>`; }
function render() {
  let html = '<table><tr><th>Test</th><th>Expected</th><th>Got</th><th>Result</th></tr>';
  for (const r of results) {
    const cls = r.pass ? 'pass' : 'fail';
    const fmt = v => typeof v === 'boolean' ? v : (typeof v === 'number' ? v.toExponential(4) : v);
    html += `<tr><td style="text-align:left">${r.label}</td><td>${fmt(r.expected)}</td><td>${fmt(r.got)}</td><td class="${cls}">${r.pass ? '✓' : '✗'}</td></tr>`;
  }
  const total = results.length, passed = results.filter(r => r.pass).length;
  html += `</table><p class="${passed===total?'pass':'fail'}">${passed}/${total} passed</p>`;
  out.innerHTML += html;
  results.length = 0;
}

// ── 1. Parallel ray factory ───────────────────────────────────────────────────
section('1. Ray Factories');
{
  const rays = makeParallelRays(1e-3, 5);
  assert('5 rays created', rays.length, 5);
  assert('first ray r = -w', rays[0].r, -1e-3);
  assert('last ray r = +w', rays[4].r, 1e-3);
  assert('all theta = 0', rays.every(r => r.theta === 0), true);

  const pts = makePointSourceRays(0, 0.01, 3);
  assert('point source: 3 rays', pts.length, 3);
  assert('point source: all r = 0', pts.every(r => r.r === 0), true);
  assert('point source: first theta = -maxAngle', pts[0].theta, -0.01);
  assert('point source: last theta = +maxAngle', pts[2].theta, 0.01);
}
render();

// ── 2. Free space propagation ─────────────────────────────────────────────────
section('2. Free Space — ray path correctness');
{
  const system = { elements: [{ type: 'free', d: 1.0 }] };
  const rays   = [{ r: 0, theta: 0.1 }, { r: 0.5, theta: 0 }];
  const { paths, optics } = traceRays(system, rays, 100);

  assert('two paths created', paths.length, 2);
  assert('no optics in free space', optics.length, 0);

  // Ray 0: r=0, theta=0.1 → after 1m: r = 0.1
  const last0 = paths[0][paths[0].length - 1];
  assertRel('angled ray r at z=1m', last0.r, 0.1, 1e-6);
  assert('angled ray theta unchanged', Math.abs(last0.theta - 0.1) < 1e-12, true);

  // Ray 1: r=0.5, theta=0 → stays at r=0.5
  const last1 = paths[1][paths[1].length - 1];
  assert('parallel ray r unchanged', Math.abs(last1.r - 0.5) < 1e-12, true);
}
render();

// ── 3. Thin lens focuses parallel rays ───────────────────────────────────────
section('3. Thin Lens — focus at focal point');
{
  const f = 0.3;
  const system = {
    elements: [
      { type: 'lens', f },
      { type: 'free', d: f * 1.5 },   // go past focal point
    ],
  };
  const rays = makeParallelRays(1e-3, 5);
  const { paths } = traceRays(system, rays, 200);

  // All rays should cross r=0 at z≈f
  const zFocus = findFocus(paths);
  assert('focus found', zFocus !== null, true);
  if (zFocus !== null) assertRel('focus at z=f', zFocus, f, 1e-3);

  // At z=f, outer ray should be at r≈0
  const outerPath = paths[paths.length - 1];
  const atFocus = outerPath.find(p => Math.abs(p.z - f) < 0.003);
  if (atFocus) assert('outer ray r≈0 at focus', Math.abs(atFocus.r) < 2e-5, true);
}
render();

// ── 4. 4f system inverts image ────────────────────────────────────────────────
section('4. 4f System — image inversion');
{
  const f = 0.2;
  const system = {
    elements: [
      { type: 'free', d: f },       // object plane → lens 1
      { type: 'lens', f },
      { type: 'free', d: 2 * f },   // lens 1 → lens 2
      { type: 'lens', f },
      { type: 'free', d: f },       // lens 2 → image plane
    ],
  };
  // Point source at r=+1mm, diverging
  const rays = makePointSourceRays(1e-3, 0.005, 7);
  const { paths } = traceRays(system, rays, 100);

  // All rays should reconverge at image plane (z = 4f) at r = -1mm (inverted)
  const ends = paths.map(p => p[p.length - 1]);
  const rMean = ends.reduce((s, p) => s + p.r, 0) / ends.length;
  assertRel('4f image inverted: r ≈ -1mm', rMean, -1e-3, 0.02);

  // Spread at image plane should be small
  const rSpread = Math.max(...ends.map(p => p.r)) - Math.min(...ends.map(p => p.r));
  assert('4f rays reconverge (spread < 5μm)', rSpread < 5e-6, true);
}
render();

// ── 5. Flat mirror = identity (unfolded) ──────────────────────────────────────
section('5. Flat Mirror (identity)');
{
  const system = {
    elements: [
      { type: 'free',   d: 0.5 },
      { type: 'mirror'            },  // flat mirror, R=Inf
      { type: 'free',   d: 0.5 },
    ],
  };
  const rays = [{ r: 0.001, theta: 0.005 }];
  const { paths, optics } = traceRays(system, rays, 100);

  assert('flat mirror recorded in optics', optics.length, 1);

  // Result should equal free propagation over 1m
  const withMirror = paths[0][paths[0].length - 1];
  const [rRef, tRef] = M.applyRay(M.free(1.0), 0.001, 0.005);
  assertRel('flat mirror: r same as 1m free', withMirror.r, rRef, 1e-9);
  assertRel('flat mirror: theta same as 1m free', withMirror.theta, tRef, 1e-9);
}
render();

// ── 6. optics list z-positions ────────────────────────────────────────────────
section('6. Optics List Positions');
{
  const system = {
    elements: [
      { type: 'free', d: 0.3 },
      { type: 'lens', f: 0.2 },
      { type: 'free', d: 0.5 },
      { type: 'lens', f: 0.1 },
      { type: 'free', d: 0.2 },
    ],
  };
  const { optics } = traceRays(system, [{ r: 0, theta: 0 }], 10);
  assert('two optics', optics.length, 2);
  assertRel('first lens at z=0.3', optics[0].z, 0.3, 1e-9);
  assertRel('second lens at z=0.8', optics[1].z, 0.8, 1e-9);
}
render();

// ── 7. Visual preview — ray diagram ──────────────────────────────────────────
{
  const system = {
    elements: [
      { type: 'free', d: 0.4 },
      { type: 'lens', f: 0.25 },
      { type: 'free', d: 0.8 },
    ],
  };
  const parallelRays  = makeParallelRays(1.5e-3, 7);
  const { paths, optics } = traceRays(system, parallelRays, 120);

  const cw = 700, ch = 200, padX = 50, padY = 20;
  const axisY = ch / 2;

  const allR = paths.flatMap(p => p.map(s => s.r));
  const zMax = paths[0][paths[0].length - 1].z;
  const rMax = Math.max(...allR.map(Math.abs)) * 1.15;
  const scale = (axisY - padY) / rMax;

  function px(z) { return padX + (z / zMax) * (cw - 2 * padX); }
  function py(r) { return axisY - r * scale; }

  // colours: 7 rays get a rainbow gradient
  const colours = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6'];

  // Build HTML then draw — avoids canvas-clearing innerHTML issue
  const canvasHTML = `<h2>7. Visual Preview — Ray Diagram</h2>
<p class="label">System: free 0.4m → lens f=0.25m → free 0.8m &nbsp;|&nbsp; 7 parallel rays ±1.5mm</p>
<canvas id="cv" width="${cw}" height="${ch}" style="background:#111"></canvas>`;
  out.insertAdjacentHTML('beforeend', canvasHTML);

  const cv  = document.getElementById('cv');
  const ctx = cv.getContext('2d');

  // Optical axis
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(padX, axisY); ctx.lineTo(cw - padX, axisY); ctx.stroke();
  ctx.setLineDash([]);

  // Optical elements
  ctx.font = '11px monospace';
  optics.forEach(el => {
    ctx.strokeStyle = '#e3c07e'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(px(el.z), padY); ctx.lineTo(px(el.z), ch - padY); ctx.stroke();
    ctx.fillStyle = '#e3c07e';
    ctx.fillText(el.type === 'lens' ? `f=${el.params.f}m` : el.type, px(el.z) + 4, padY + 10);
  });

  // Ray paths
  paths.forEach((path, i) => {
    ctx.strokeStyle = colours[i % colours.length];
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    path.forEach((pt, j) => j === 0 ? ctx.moveTo(px(pt.z), py(pt.r)) : ctx.lineTo(px(pt.z), py(pt.r)));
    ctx.stroke();
  });

  // z labels
  ctx.fillStyle = '#666'; ctx.font = '10px monospace';
  [0, 0.3, 0.6, 0.9, 1.2].forEach(z => {
    if (z <= zMax) ctx.fillText(`${(z * 100).toFixed(0)}cm`, px(z) - 10, ch - 4);
  });

  const zFocus = findFocus(paths);
  out.insertAdjacentHTML('beforeend',
    `<p class="label">Focus found at z = ${zFocus !== null ? (zFocus*100).toFixed(1)+'cm (expected '+(0.4+0.25)*100+'cm)' : 'not found'}</p>`);
}
</script>
</body>
</html>
